version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: edc-db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edc
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - edc-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.1
    container_name: edc-keycloak
    restart: always
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
      KC_FEATURES: token-exchange
    command: start-dev --import-realm
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json
    networks:
      - edc-network

  backend:
    build: ./backend
    container_name: edc-backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/edc
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: edc-realm
      KEYCLOAK_CLIENT_ID: edc-backend
      USE_MOCK_IAM: "true"
    networks:
      - edc-network
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: edc-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5001
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8081
      NEXT_PUBLIC_KEYCLOAK_REALM: edc-realm
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: edc-frontend
      NEXT_PUBLIC_USE_MOCK_IAM: "true"
    networks:
      - edc-network
    depends_on:
      - backend

volumes:
  pgdata:

networks:
  edc-network:
    driver: bridge
